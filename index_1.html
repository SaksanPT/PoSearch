<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบติดตามสถานะ PO</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root {
  --bg-color: #f0fdf4;
  --primary-color: #57b894;
  --primary-hover: #429778;
  --text-dark: #334155;
  --text-muted: #64748b;
  --card-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
  --success-bg: #d1fae5; --success-text: #065f46;
  --warning-bg: #fef3c7; --warning-text: #92400e;
  --danger-bg: #fee2e2;  --danger-text: #b91c1c;
}
body { padding: 20px; background-color: var(--bg-color); font-family: 'Sarabun', sans-serif; color: var(--text-dark); }

/* ===== LOGIN ===== */
#loginOverlay {
  position: fixed; top:0; left:0; width:100%; height:100%;
  background: linear-gradient(135deg, #a7f3d0, #57b894);
  z-index: 9999; display: flex; justify-content: center; align-items: center;
}
.login-card {
  background: white; padding: 40px; border-radius: 20px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center;
}
.login-input {
  font-size: 1.5rem; letter-spacing: 3px; text-align: center;
  border-radius: 12px; padding: 12px; margin-bottom: 20px;
  border: 2px solid #e2e8f0; background: #f8fafc;
}

/* ===== HEADER ===== */
.main-header {
  background: white; padding: 15px 20px; border-radius: 16px;
  box-shadow: var(--card-shadow); margin-bottom: 20px;
  display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 15px;
}
h3 { font-weight: 700; color: var(--primary-color); margin: 0; font-size: 1.4rem; }

/* ===== BUTTONS ===== */
.btn { border-radius: 8px; font-weight: 500; transition: all 0.2s; }
.btn:hover { transform: translateY(-1px); }
.btn-primary { background-color: var(--primary-color); border-color: var(--primary-color); }
.btn-primary:hover { background-color: var(--primary-hover); border-color: var(--primary-hover); }

.source-btn {
  border: 1px solid #e2e8f0; background: white; color: var(--text-muted);
  border-radius: 8px; padding: 8px 16px; font-weight: 600; font-size: 0.9rem; cursor: pointer;
}
.source-btn.active {
  border-color: var(--primary-color); background-color: #ecfdf5;
  color: var(--primary-color); box-shadow: 0 2px 4px rgba(87,184,148,0.2);
}

.warehouse-btn {
  background: white; border: 1px solid #e2e8f0; color: var(--text-muted);
  border-radius: 6px; padding: 4px 10px; font-size: 0.8rem; font-weight: 500;
  cursor: pointer; transition: all 0.2s ease; display: inline-flex; align-items: center;
}
.warehouse-btn:hover { background-color: #f8fafc; border-color: #cbd5e1; transform: translateY(-1px); }
.warehouse-btn.active {
  background-color: var(--primary-color); color: white;
  border-color: var(--primary-color); box-shadow: 0 2px 4px rgba(87,184,148,0.25); font-weight: 600;
}
.count-badge {
  background-color: rgba(0,0,0,0.05); border-radius: 4px;
  padding: 0 5px; margin-left: 5px; font-size: 0.8em;
}
.active .count-badge { background-color: rgba(255,255,255,0.25); color: white; }

/* ===== CARDS ===== */
.status-header {
  font-weight: 700; text-align: center; padding: 10px;
  border-radius: 10px; margin-bottom: 15px; font-size: 1rem;
}
.bg-head-success { background-color: var(--success-bg); color: var(--success-text); }
.bg-head-warning { background-color: var(--warning-bg); color: var(--warning-text); }
.bg-head-danger  { background-color: var(--danger-bg);  color: var(--danger-text); }

.po-card {
  background: white; border-radius: 12px; box-shadow: var(--card-shadow);
  margin-bottom: 12px; overflow: hidden; border-left: 5px solid #ccc; transition: transform 0.2s;
}
.po-card:hover { transform: translateY(-2px); }
.card-border-success { border-left-color: #34d399 !important; }
.card-border-warning { border-left-color: #fbbf24 !important; }
.card-border-danger  { border-left-color: #f87171 !important; }

.po-header {
  padding: 10px 15px; background: #f8fafc;
  border-bottom: 1px solid #f1f5f9; font-weight: 600;
  display: flex; justify-content: space-between; align-items: center; font-size: 0.95rem;
}
.po-body { padding: 12px 15px; font-size: 0.9rem; }
.info-row { display: flex; margin-bottom: 6px; align-items: baseline; }
.info-label { width: 90px; color: var(--text-muted); font-size: 0.8rem; }
.info-value { flex: 1; font-weight: 500; color: var(--text-dark); }

.status-badge { padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
.bg-success { background-color: var(--success-bg) !important; color: var(--success-text) !important; }
.bg-warning { background-color: var(--warning-bg) !important; color: var(--warning-text) !important; }
.bg-danger  { background-color: var(--danger-bg)  !important; color: var(--danger-text)  !important; }

.vendor-tag { font-size: 0.7rem; padding: 2px 8px; border-radius: 6px; color: white; font-weight: 500; }

/* ===== UPLOAD OVERLAY ===== */
.upload-overlay {
  position: fixed; top:0; left:0; width:100%; height:100%;
  background: rgba(255,255,255,0.9); z-index:10000; display:none;
  flex-direction:column; justify-content:center; align-items:center; backdrop-filter: blur(5px);
}
.file-input { display: none; }

/* ===== NO DATA ===== */
.no-data-alert {
  text-align: center; padding: 40px; color: var(--text-muted);
  background: white; border-radius: 16px; margin-top: 20px;
  box-shadow: var(--card-shadow); border: 2px dashed #e2e8f0;
}

/* ===== LOAD MORE ===== */
.load-more-btn {
  background: white; border: 1px solid #e2e8f0; color: var(--primary-color);
  padding: 8px 24px; border-radius: 50px; font-weight: 600; font-size: 0.9rem; transition: all 0.2s;
}
.load-more-btn:hover { background: #f8fafc; transform: scale(1.02); }

/* ===== PROGRESS ===== */
.upload-progress { width: 300px; margin-top: 20px; }

@media (max-width: 768px) {
  body { padding: 10px; }
  .main-header { padding: 15px; flex-direction: column; align-items: stretch; text-align: center; gap: 10px; }
  .d-flex.gap-2 { justify-content: center; flex-wrap: wrap; }
  .source-btn { width: 100%; margin: 2px 0; justify-content: center; }
  .col-md-4 { margin-bottom: 20px; }
}
</style>
</head>
<body>

<!-- Upload Loader -->
<div id="uploadLoader" class="upload-overlay">
  <div class="spinner-border text-primary" style="width:3rem;height:3rem;" role="status"></div>
  <h6 class="mt-3 text-dark fw-bold" id="uploadStatusText">กำลังอัปโหลด...</h6>
  <small class="text-muted" id="uploadSubText">กรุณารอสักครู่</small>
  <div class="upload-progress mt-3">
    <div class="progress" style="height:8px;border-radius:4px;">
      <div id="uploadProgressBar" class="progress-bar bg-success" style="width:0%;transition:width 0.3s;"></div>
    </div>
    <small class="text-muted mt-1 d-block text-center" id="uploadProgressText"></small>
  </div>
</div>

<!-- Login -->
<div id="loginOverlay">
  <div class="login-card">
    <div class="mb-4">
      <div class="bg-success bg-opacity-10 rounded-circle d-inline-flex p-3 mb-3">
        <i class="fas fa-cubes fa-2x text-success"></i>
      </div>
      <h3 class="text-dark fw-bold">เข้าสู่ระบบ</h3>
      <p class="text-muted small">ระบบติดตามสถานะ PO</p>
    </div>
    <form onsubmit="handleLogin(event)">
      <input type="password" id="loginId" class="form-control login-input" placeholder="CODE" required autofocus>
      <button type="submit" id="btnLogin" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm">ตรวจสอบสิทธิ์</button>
    </form>
    <div id="loginMsg" class="mt-3 text-danger fw-bold small"></div>
  </div>
</div>

<!-- Upload Modal -->
<div class="modal fade" id="uploadModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content" style="border-radius:16px;border:none;">
      <div class="modal-header border-0 pb-0">
        <h5 class="modal-title fw-bold text-dark ps-2"><i class="fas fa-cloud-upload-alt text-primary"></i> อัปโหลดข้อมูล</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-4">
        <p class="text-muted small mb-4 text-center">เลือกไฟล์ .xlsx เพื่ออัปโหลด (ข้อมูลเก่าจะถูกแทนที่)</p>
        <div class="d-grid gap-3">
          <input type="file" id="file_CHV"     class="file-input" accept=".xlsx" onchange="processUpload('chv_data', this, 'CHV')">
          <button class="btn btn-outline-primary text-start p-3" onclick="document.getElementById('file_CHV').click()">
            <i class="fas fa-file-excel me-2"></i> อัปโหลด <b>Chevron (CHV)</b>
          </button>
          <input type="file" id="file_MRC"     class="file-input" accept=".xlsx" onchange="processUpload('mrc_data', this, 'MRC')">
          <button class="btn btn-outline-success text-start p-3" onclick="document.getElementById('file_MRC').click()">
            <i class="fas fa-file-excel me-2"></i> อัปโหลด <b>Miracle (MRC)</b>
          </button>
          <input type="file" id="file_PSP"     class="file-input" accept=".xlsx" onchange="processUpload('exgodown_data', this, 'EX-Godown')">
          <button class="btn btn-outline-warning text-dark text-start p-3" onclick="document.getElementById('file_PSP').click()">
            <i class="fas fa-file-excel me-2"></i> อัปโหลด <b>PSP (EX-Godown)</b>
          </button>
          <input type="file" id="file_ME2N"    class="file-input" accept=".xlsx" onchange="processUpload('me2n_data', this, 'Me2n')">
          <button class="btn btn-outline-secondary text-start p-3" onclick="document.getElementById('file_ME2N').click()">
            <i class="fas fa-file-excel me-2"></i> อัปโหลด <b>ME2N</b>
          </button>
          <input type="file" id="file_MB51"    class="file-input" accept=".xlsx" onchange="processUpload('mb51_data', this, 'MB51')">
          <button class="btn btn-outline-dark text-start p-3" onclick="document.getElementById('file_MB51').click()">
            <i class="fas fa-file-excel me-2"></i> อัปโหลด <b>MB51</b>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Main App -->
<div id="mainApp" class="container-fluid" style="max-width:1400px;display:none;">

  <!-- Header -->
  <div class="main-header">
    <div class="d-flex align-items-center gap-3">
      <div class="bg-primary bg-opacity-10 p-3 rounded-circle text-primary">
        <i class="fas fa-search-location fa-lg"></i>
      </div>
      <div>
        <h3 class="mb-0">ติดตามสถานะ PO</h3>
        <small class="text-muted">ระบบตรวจสอบการจัดส่งสินค้า</small>
      </div>
    </div>
    <div class="d-flex align-items-center gap-2 flex-wrap">
      <span class="badge bg-light text-dark border"><i class="fas fa-user-circle text-muted"></i> <span id="userRoleDisplay">-</span></span>
      <span class="badge bg-white text-dark border" id="userWarehouseBadge" style="display:none;">
        <i class="fas fa-warehouse text-primary"></i> <span id="userWarehouseDisplay"></span>
      </span>
      <button id="headerUploadBtn" class="btn btn-primary btn-sm shadow-sm" style="display:none;" data-bs-toggle="modal" data-bs-target="#uploadModal">
        <i class="fas fa-cloud-upload-alt"></i> อัปโหลด
      </button>
      <button class="btn btn-success btn-sm shadow-sm text-white" onclick="exportToExcel()" style="background-color:#10b981;border:none;">
        <i class="fas fa-file-download"></i> Export
      </button>
      <button class="btn btn-sm btn-outline-danger" onclick="logout()">
        <i class="fas fa-sign-out-alt"></i>
      </button>
    </div>
  </div>

  <!-- Filter Panel -->
  <div class="card p-4 mb-4 border-0" style="border-radius:16px;box-shadow:var(--card-shadow);">
    <div class="row g-4">
      <div class="col-md-5">
        <label class="form-label text-muted fw-bold small text-uppercase">แหล่งข้อมูล</label>
        <div class="d-flex flex-wrap gap-2">
          <button class="source-btn active" onclick="toggleSource('CHV', this)">Chevron</button>
          <button class="source-btn active" onclick="toggleSource('MRC', this)">Miracle</button>
          <button class="source-btn active" onclick="toggleSource('EX-Godown', this)">PSP</button>
          <button class="source-btn active" onclick="toggleSource('Me2n', this)">Me2n</button>
          <button class="source-btn active" onclick="toggleSource('MB51', this)">MB51</button>
        </div>
        <div class="mt-3">
          <small class="text-muted" style="font-size:0.8rem;">
            <i class="far fa-clock me-1 text-primary"></i> อัปเดตล่าสุด:
            <span id="lastUpdateDisplay" class="fw-bold text-dark">-</span>
          </small>
        </div>
      </div>
      <div class="col-md-7">
        <label class="form-label text-muted fw-bold small text-uppercase">Warehouse (คลัง)</label>
        <div id="filterButtonContainer"><span class="text-muted fst-italic small">Loading...</span></div>
      </div>
    </div>
    <hr class="my-4" style="opacity:0.1;">
    <div class="row g-2 align-items-center">
      <div class="col-md-9">
        <div class="input-group shadow-sm" style="border-radius:50px;overflow:hidden;">
          <span class="input-group-text bg-white border-0 ps-3"><i class="fas fa-search text-muted"></i></span>
          <input type="text" id="searchInput" class="form-control border-0 py-2"
            placeholder="พิมพ์เลข PO, ชื่อสถานี, วันที่ หรือสถานะ..."
            oninput="debounceSearch()">
        </div>
      </div>
      <div class="col-md-3">
        <button class="btn btn-primary w-100 py-2 shadow-sm rounded-pill" onclick="performSearch()">ค้นหา</button>
      </div>
    </div>
  </div>

  <!-- Results -->
  <div id="loader" class="text-center mt-5">
    <div class="spinner-border text-primary" role="status"></div>
    <p class="mt-2 text-muted">กำลังดึงข้อมูล...</p>
  </div>

  <div id="resultSection" style="display:none;">
    <div id="noDataMessage" style="display:none;"></div>
    <div id="cardContainer" class="row g-4">
      <div class="col-md-4">
        <div class="status-header bg-head-success"><i class="fas fa-check-circle me-1"></i> สำเร็จ (<span id="countSuccess">0</span>)</div>
        <div id="colSuccess"></div>
      </div>
      <div class="col-md-4">
        <div class="status-header bg-head-warning"><i class="fas fa-truck me-1"></i> ระหว่างส่ง (<span id="countPending">0</span>)</div>
        <div id="colPending"></div>
      </div>
      <div class="col-md-4">
        <div class="status-header bg-head-danger"><i class="fas fa-times-circle me-1"></i> ไม่สำเร็จ (<span id="countFailed">0</span>)</div>
        <div id="colFailed"></div>
      </div>
    </div>
    <div class="text-center mt-5 mb-5">
      <button id="loadMoreBtn" class="load-more-btn shadow-sm" style="display:none;" onclick="loadMore()">
        <i class="fas fa-chevron-down me-1"></i> แสดงเพิ่ม
      </button>
      <div id="displayCountText" class="text-muted mt-2 small"></div>
    </div>
  </div>

</div>

<script>
// =============================================
// 🔧 CONFIG — แก้ค่านี้ให้ตรงกับ Supabase ของคุณ
// =============================================
const SUPABASE_URL  = 'https://tbeaemmupueanpxjxegh.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRiZWFlbW11cHVlYW5weGp4ZWdoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2ODQ3MTQsImV4cCI6MjA5NzI2MDcxNH0.X2-_X9HpG1-8WihISD40e7Rz-LlXxAwB7U0Pt2BCQSQ';

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON);

// =============================================
// 🗂️ CONFIG ตาราง แต่ละ source
// =============================================
const SOURCE_CONFIG = {
  CHV: {
    table: 'chv_data',
    label: 'Chevron',
    color: '#0d6efd',
    getRows: (data) => data.map(r => ({
      po:              String(r['Customer PO Number'] || ''),
      warehouse:       String(r['Ship-to Number']    || ''),
      status:          String(r['Status(Complete/Incomplete)'] || ''),
      delivery_date:   r['Actual Delivery date'] ? String(r['Actual Delivery date']) : null,
      point_code:      String(r['Ship-to Number']  || ''),
      station_name:    String(r['Ship-To Name']    || ''),
    })),
    mapStatus: (s) => {
      if (!s) return 'PENDING';
      if (s === 'Pass' || s === 'Completed') return 'SUCCESS';
      if (s === 'Fail' || s === 'Rejected')  return 'FAILED';
      return 'PENDING';
    }
  },
  MRC: {
    table: 'mrc_data',
    label: 'Miracle',
    color: '#198754',
    getRows: (data) => data.map(r => ({
      po:              String(r['เลขที่ใบส่ง'] || ''),
      warehouse:       String(r['ศูนย์']       || ''),
      status:          String(r['สถานะยืนยัน'] || ''),
      delivery_date:   r['วันที่ยืนยัน'] ? String(r['วันที่ยืนยัน']) : null,
      point_code:      String(r['พื้นที่ส่ง']  || ''),
      station_name:    String(r['ชื่อจุดส่ง']  || ''),
    })),
    mapStatus: (s) => {
      if (!s) return 'PENDING';
      if (s.includes('ส่งเสร็จ')) return 'SUCCESS';
      if (s === 'ส่งไม่ได้' || s.includes('คืน')) return 'FAILED';
      return 'PENDING';
    }
  },
  'EX-Godown': {
    table: 'exgodown_data',
    label: 'PSP',
    color: '#e67e22',
    getRows: (data) => data.map(r => ({
      po:              String(r['เลขที่ใบส่ง'] || ''),
      warehouse:       String(r['ศูนย์']       || ''),
      status:          String(r['สถานะยืนยัน'] || ''),
      delivery_date:   r['วันที่ยืนยัน'] ? String(r['วันที่ยืนยัน']) : null,
      point_code:      String(r['จุดส่ง']      || ''),
      station_name:    String(r['ชื่อจุดส่ง']  || ''),
    })),
    mapStatus: (s) => {
      if (!s) return 'PENDING';
      if (s.includes('ส่งเสร็จ')) return 'SUCCESS';
      if (s === 'ส่งไม่ได้' || s.includes('คืน')) return 'FAILED';
      return 'PENDING';
    }
  },
  Me2n: {
    table: 'me2n_data',
    label: 'Me2n',
    color: '#6f42c1',
    getRows: (data) => data.map(r => ({
      po:              String(r['Purchasing Document'] || ''),
      warehouse:       String(r['Plant']               || ''),
      status:          Number(r['Still to be delivered (qty)'] || 0) === 0 ? 'ส่งครบ' : 'ยังค้างส่ง',
      delivery_date:   r['Document Date'] ? String(r['Document Date']) : null,
      point_code:      String(r['Purchasing Group']    || ''),
      station_name:    String(r['Short Text']          || ''),
    })),
    mapStatus: (s) => {
      if (!s) return 'PENDING';
      if (s === 'ส่งครบ') return 'SUCCESS';
      return 'PENDING';
    }
  },
  MB51: {
    table: 'mb51_data',
    label: 'MB51',
    color: '#495057',
    getRows: (data) => data.map(r => ({
      po:              String(r['Purchase order']      || ''),
      warehouse:       String(r['Plant']               || ''),
      status:          String(r['Movement Type Text']  || ''),
      delivery_date:   r['Posting Date'] ? String(r['Posting Date']) : null,
      point_code:      String(r['Storage Location']    || ''),
      station_name:    String(r['Material Description']|| ''),
    })),
    mapStatus: (s) => {
      if (!s) return 'PENDING';
      if (s === 'GR goods receipt') return 'SUCCESS';
      return 'PENDING';
    }
  }
};

// =============================================
// 🔐 AUTH
// =============================================
let currentUser = null;

async function handleLogin(e) {
  e.preventDefault();
  const code = document.getElementById('loginId').value.trim();
  const btn  = document.getElementById('btnLogin');
  const msg  = document.getElementById('loginMsg');

  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> รอสักครู่...';
  msg.innerText = '';

  const { data, error } = await db.from('users').select('*').eq('code', code).single();

  if (error || !data) {
    msg.innerText = 'รหัสผ่านไม่ถูกต้อง';
    btn.disabled = false;
    btn.innerText = 'ตรวจสอบสิทธิ์';
    return;
  }

  currentUser = data;
  document.getElementById('userRoleDisplay').innerText = data.role.toUpperCase();

  if (data.warehouse) {
    document.getElementById('userWarehouseBadge').style.display = 'inline-block';
    document.getElementById('userWarehouseDisplay').innerText = data.warehouse;
    selectedWarehouse = data.warehouse;
  }

  if (data.role === 'admin') {
    document.getElementById('headerUploadBtn').style.display = 'inline-block';
  }

  document.getElementById('loginOverlay').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';
  fetchAllData();
}

function logout() { location.reload(); }

// =============================================
// 📥 FETCH DATA
// =============================================
let masterData       = [];
let activeSourceData = [];
let activeResults    = [];
let currentDisplay   = [];
let selectedSources  = ['CHV', 'MRC', 'EX-Godown', 'Me2n', 'MB51'];
let selectedWarehouse = 'ALL';
let renderLimit      = 50;
const LOAD_STEP      = 50;
let searchTimer      = null;

async function fetchAllData() {
  document.getElementById('loader').style.display = 'block';
  document.getElementById('resultSection').style.display = 'none';
  masterData = [];

  const fetches = Object.entries(SOURCE_CONFIG).map(async ([sourceKey, cfg]) => {
    const { data, error } = await db.from(cfg.table).select('*').order('uploaded_at', { ascending: false });
    if (error) { console.error(`Error fetching ${sourceKey}:`, error); return; }
    if (!data || data.length === 0) return;

    // หา uploaded_at ล่าสุด
    if (data[0]?.uploaded_at) {
      const d = new Date(data[0].uploaded_at);
      document.getElementById('lastUpdateDisplay').innerText = d.toLocaleString('th-TH');
    }

    data.forEach(row => {
      masterData.push({
        source:        sourceKey,
        po:            row.po            || '-',
        warehouse:     row.warehouse     || '-',
        status:        row.status        || '-',
        delivery_date: row.delivery_date || null,
        point_code:    row.point_code    || '-',
        station_name:  row.station_name  || '-',
      });
    });
  });

  await Promise.all(fetches);

  document.getElementById('loader').style.display = 'none';
  document.getElementById('resultSection').style.display = 'block';
  updateView();
}

// =============================================
// 🔍 FILTER & SEARCH
// =============================================
function toggleSource(src, btn) {
  btn.classList.toggle('active');
  if (selectedSources.includes(src)) {
    selectedSources = selectedSources.filter(s => s !== src);
  } else {
    selectedSources.push(src);
  }
  updateView();
}

function debounceSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(performSearch, 400);
}

function performSearch() {
  const kw = document.getElementById('searchInput').value.toLowerCase().trim();
  activeSourceData = masterData.filter(r => selectedSources.includes(r.source));

  if (kw) {
    const terms = kw.split(/[\s,]+/).filter(t => t.length > 0);
    activeResults = activeSourceData.filter(row => {
      const str = Object.values(row).join(' ').toLowerCase();
      return terms.some(t => str.includes(t));
    });
  } else {
    activeResults = activeSourceData;
  }

  createWarehouseButtons();
  applyWarehouseFilter();
}

function updateView() {
  activeSourceData = masterData.filter(r => selectedSources.includes(r.source));
  activeResults    = activeSourceData;
  createWarehouseButtons();
  applyWarehouseFilter();
}

function createWarehouseButtons() {
  const counts = {};
  activeResults.forEach(r => {
    const k = r.warehouse;
    if (k && k !== '-') counts[k] = (counts[k] || 0) + 1;
  });

  const keys = Object.keys(counts).sort();
  let html = `<button class="warehouse-btn ${selectedWarehouse === 'ALL' ? 'active' : ''}" onclick="clickWarehouse('ALL',this)">All <span class="count-badge">${activeResults.length}</span></button>`;
  keys.forEach(k => {
    const isActive = String(k) === String(selectedWarehouse) ? 'active' : '';
    html += `<button class="warehouse-btn ${isActive}" onclick="clickWarehouse('${k}',this)">${k} <span class="count-badge">${counts[k]}</span></button>`;
  });
  document.getElementById('filterButtonContainer').innerHTML = html;
}

function clickWarehouse(key, btn) {
  document.querySelectorAll('.warehouse-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedWarehouse = key;
  applyWarehouseFilter();
}

function applyWarehouseFilter() {
  if (selectedWarehouse === 'ALL') {
    currentDisplay = activeResults;
  } else {
    currentDisplay = activeResults.filter(r => String(r.warehouse) === String(selectedWarehouse));
  }
  renderLimit = LOAD_STEP;
  renderCards();
}

// =============================================
// 🃏 RENDER CARDS
// =============================================
function getStatusBucket(source, status) {
  return SOURCE_CONFIG[source]?.mapStatus(status) || 'PENDING';
}

function renderCards() {
  const noDataMsg    = document.getElementById('noDataMessage');
  const cardContainer = document.getElementById('cardContainer');

  if (currentDisplay.length === 0) {
    cardContainer.style.display = 'none';
    document.getElementById('loadMoreBtn').style.display = 'none';
    noDataMsg.style.display = 'block';
    const kw = document.getElementById('searchInput').value;
    noDataMsg.innerHTML = kw
      ? `<div class="no-data-alert"><i class="fas fa-search fa-2x mb-3 text-muted"></i><br>ไม่พบข้อมูลที่ค้นหา</div>`
      : `<div class="no-data-alert"><i class="fas fa-box-open fa-2x mb-3 text-muted"></i><br>ไม่มีข้อมูลในคลังนี้</div>`;
    return;
  }

  noDataMsg.style.display = 'none';
  cardContainer.style.display = 'flex';

  let htmlS = '', htmlP = '', htmlF = '';
  let cntS = 0, cntP = 0, cntF = 0;
  let showS = 0, showP = 0, showF = 0;

  currentDisplay.forEach(row => {
    const bucket = getStatusBucket(row.source, row.status);
    if (bucket === 'SUCCESS') cntS++;
    else if (bucket === 'FAILED') cntF++;
    else cntP++;

    let shouldRender = false;
    if (bucket === 'SUCCESS' && showS < renderLimit) { shouldRender = true; showS++; }
    else if (bucket === 'PENDING' && showP < renderLimit) { shouldRender = true; showP++; }
    else if (bucket === 'FAILED' && showF < renderLimit) { shouldRender = true; showF++; }

    if (!shouldRender) return;

    const cfg    = SOURCE_CONFIG[row.source] || { label: row.source, color: '#6c757d' };
    const cardCls = bucket === 'SUCCESS' ? 'card-border-success' : bucket === 'FAILED' ? 'card-border-danger' : 'card-border-warning';
    const badgeCls = bucket === 'SUCCESS' ? 'bg-success' : bucket === 'FAILED' ? 'bg-danger' : 'bg-warning text-dark';

    let dateVal = row.delivery_date || '-';
    if (dateVal && dateVal !== '-') {
      try { dateVal = new Date(dateVal).toLocaleDateString('th-TH'); } catch(e) {}
    }

    const card = `
      <div class="po-card ${cardCls}">
        <div class="po-header">
          <span>PO: ${row.po}</span>
          <span class="vendor-tag" style="background:${cfg.color}">${cfg.label}</span>
        </div>
        <div class="po-body">
          <div class="info-row"><div class="info-label">คลัง:</div><div class="info-value">${row.warehouse}</div></div>
          <div class="info-row"><div class="info-label">รหัสจุดส่ง:</div><div class="info-value fw-bold text-primary">${row.point_code}</div></div>
          <div class="info-row"><div class="info-label">ชื่อสถานี:</div><div class="info-value text-truncate">${row.station_name}</div></div>
          <div class="info-row"><div class="info-label">วันที่ถึง:</div><div class="info-value">${dateVal}</div></div>
          <div class="mt-2 d-flex justify-content: space-between align-items-center">
            <small class="text-muted me-2">สถานะ:</small>
            <span class="status-badge ${badgeCls}">${row.status}</span>
          </div>
        </div>
      </div>`;

    if (bucket === 'SUCCESS') htmlS += card;
    else if (bucket === 'FAILED') htmlF += card;
    else htmlP += card;
  });

  document.getElementById('colSuccess').innerHTML = htmlS;
  document.getElementById('colPending').innerHTML = htmlP;
  document.getElementById('colFailed').innerHTML  = htmlF;
  document.getElementById('countSuccess').innerText = cntS.toLocaleString();
  document.getElementById('countPending').innerText = cntP.toLocaleString();
  document.getElementById('countFailed').innerText  = cntF.toLocaleString();

  const shown = showS + showP + showF;
  const total = cntS + cntP + cntF;
  const btn = document.getElementById('loadMoreBtn');
  const txt = document.getElementById('displayCountText');
  if (shown < total) {
    btn.style.display = 'inline-block';
    txt.innerText = `แสดง ${shown.toLocaleString()} จาก ${total.toLocaleString()} รายการ`;
  } else {
    btn.style.display = 'none';
    txt.innerText = `แสดงครบทั้งหมด ${total.toLocaleString()} รายการ`;
  }
}

function loadMore() { renderLimit += LOAD_STEP; renderCards(); }

// =============================================
// 📤 UPLOAD EXCEL → SUPABASE
// =============================================
async function processUpload(tableName, inputEl, sourceKey) {
  const file = inputEl.files[0];
  if (!file) return;
  if (!confirm(`ยืนยันอัปโหลด "${file.name}" ?\n(ข้อมูลเก่าใน ${tableName} จะถูกลบและแทนที่)`)) {
    inputEl.value = ''; return;
  }

  // ปิด modal
  const modal = bootstrap.Modal.getInstance(document.getElementById('uploadModal'));
  if (modal) modal.hide();

  showUploadProgress('กำลังอ่านไฟล์...', '', 10);

  const reader = new FileReader();
  reader.onload = async (e) => {
    try {
      const wb   = XLSX.read(new Uint8Array(e.target.result), { type: 'array', cellDates: true });
      const ws   = wb.Sheets[wb.SheetNames[0]];

      // หา header row (MRC/EX-Godown มี offset)
      let headerRow = 0;
      const raw = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
      if (sourceKey === 'MRC' || sourceKey === 'EX-Godown') {
        // หาแถวที่มี 'เลขที่ใบส่ง'
        for (let i = 0; i < raw.length; i++) {
          if (raw[i].includes('เลขที่ใบส่ง')) { headerRow = i; break; }
        }
      }

      const jsonData = XLSX.utils.sheet_to_json(ws, { defval: '', dateNF: 'yyyy-mm-dd', range: headerRow });

      showUploadProgress('กำลังแปลงข้อมูล...', `พบ ${jsonData.length} แถว`, 30);

      // Map ข้อมูล
      const cfg  = SOURCE_CONFIG[sourceKey];
      const rows = cfg.getRows(jsonData).filter(r => r.po && r.po !== '' && r.po !== '-');

      showUploadProgress('กำลังลบข้อมูลเก่า...', '', 50);

      // ลบข้อมูลเก่า
      const { error: delErr } = await db.from(tableName).delete().neq('id', 0);
      if (delErr) throw new Error('ลบข้อมูลเก่าไม่สำเร็จ: ' + delErr.message);

      showUploadProgress('กำลังบันทึกข้อมูลใหม่...', `${rows.length} รายการ`, 70);

      // Insert เป็น batch
      const BATCH = 500;
      for (let i = 0; i < rows.length; i += BATCH) {
        const batch = rows.slice(i, i + BATCH);
        const { error: insErr } = await db.from(tableName).insert(batch);
        if (insErr) throw new Error('Insert ไม่สำเร็จ: ' + insErr.message);
        const pct = 70 + Math.round(((i + BATCH) / rows.length) * 25);
        showUploadProgress('กำลังบันทึก...', `${Math.min(i+BATCH, rows.length)} / ${rows.length}`, Math.min(pct, 95));
      }

      showUploadProgress('สำเร็จ! ✅', `อัปโหลด ${rows.length} รายการ`, 100);
      setTimeout(() => {
        document.getElementById('uploadLoader').style.display = 'none';
        fetchAllData();
      }, 1000);

    } catch (err) {
      document.getElementById('uploadLoader').style.display = 'none';
      alert('❌ เกิดข้อผิดพลาด: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
  inputEl.value = '';
}

function showUploadProgress(title, sub, pct) {
  document.getElementById('uploadLoader').style.display = 'flex';
  document.getElementById('uploadStatusText').innerText  = title;
  document.getElementById('uploadSubText').innerText     = sub;
  document.getElementById('uploadProgressBar').style.width = pct + '%';
  document.getElementById('uploadProgressText').innerText  = pct + '%';
}

// =============================================
// 📊 EXPORT
// =============================================
function exportToExcel() {
  if (!currentDisplay || currentDisplay.length === 0) { alert('ไม่มีข้อมูลที่จะ Export'); return; }
  const headers = ['Source','PO','Warehouse','Status','Delivery Date','Point Code','Station Name'];
  const rows = currentDisplay.map(r => [r.source, r.po, r.warehouse, r.status, r.delivery_date, r.point_code, r.station_name]);
  const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'PO_Data');
  XLSX.writeFile(wb, 'PO_Export.xlsx');
}
